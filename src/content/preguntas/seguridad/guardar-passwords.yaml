question: '¿Cuál es la forma correcta de almacenar contraseñas de usuarios?'
options:
  - 'Cifradas con AES y una clave bien guardada'
  - 'Con SHA-256, que es un hash criptográfico'
  - 'Con un hash lento y salt por usuario: bcrypt, scrypt o Argon2'
  - 'En claro, pero en una tabla con permisos restringidos'
correct: 2
explanation: >-
  Lo cifrado se descifra si roban la clave, y un hash rápido como SHA-256 se
  fuerza a miles de millones de intentos por segundo con una GPU. Los hashes
  de contraseñas son deliberadamente lentos y llevan salt aleatorio por
  usuario, que inutiliza las tablas precalculadas.
category: seguridad
difficulty: medio
