# Recursos externos recomendados — un recurso por entrada.
# type: documentacion | libro | curso | video | herramienta | articulo
- id: refactoring-guru
  title: Refactoring.Guru — Patrones de diseño
  url: https://refactoring.guru/es/design-patterns
  description: >-
    El catálogo de patrones GoF mejor explicado de internet: ilustraciones,
    problema/solución, pros y contras, y ejemplos en varios lenguajes. En
    español.
  category: patrones-de-diseno
  type: documentacion
  lang: es

- id: roadmap-sh
  title: roadmap.sh
  url: https://roadmap.sh
  description: >-
    Mapas visuales de aprendizaje por rol (frontend, backend, DevOps…) y por
    tecnología, mantenidos por la comunidad. Útiles para saber qué estudiar
    después.
  category: metodologias
  type: herramienta
  lang: en

- id: mdn
  title: MDN Web Docs
  url: https://developer.mozilla.org/es/
  description: >-
    La referencia canónica de la plataforma web: JavaScript, HTML, CSS y APIs
    del navegador, con gran parte del contenido traducido al español.
  category: buenas-practicas
  type: documentacion
  lang: es

- id: javascript-info
  title: The Modern JavaScript Tutorial
  url: https://es.javascript.info
  description: >-
    Curso completo y gratuito de JavaScript moderno, desde fundamentos hasta
    temas avanzados, con ejercicios. Traducido al español por la comunidad.
  category: buenas-practicas
  type: curso
  lang: es

- id: twelve-factor
  title: The Twelve-Factor App
  url: https://12factor.net/es/
  description: >-
    Doce principios para construir aplicaciones preparadas para la nube:
    configuración, dependencias, logs, procesos… Base conceptual de mucho del
    DevOps moderno. Disponible en español.
  category: arquitectura
  type: articulo
  lang: es

- id: big-o-cheatsheet
  title: Big-O Cheat Sheet
  url: https://www.bigocheatsheet.com
  description: >-
    Tabla de referencia con las complejidades de las estructuras de datos y
    algoritmos de ordenación más comunes. Perfecta para repasar antes de una
    entrevista.
  category: algoritmos
  type: herramienta
  lang: en

- id: owasp-top-10
  title: OWASP Top 10
  url: https://owasp.org/www-project-top-ten/
  description: >-
    La lista de referencia de los diez riesgos de seguridad más críticos en
    aplicaciones web, con guías de prevención. Punto de partida obligado en
    seguridad.
  category: seguridad
  type: documentacion
  lang: en

- id: web-dev
  title: web.dev
  url: https://web.dev
  description: >-
    Guías de Google sobre rendimiento, accesibilidad y buenas prácticas web
    modernas, con métricas (Core Web Vitals) y ejemplos aplicables.
  category: devops
  type: documentacion
  lang: en

- id: practical-test-pyramid
  title: The Practical Test Pyramid — Martin Fowler
  url: https://martinfowler.com/articles/practical-test-pyramid.html
  description: >-
    La explicación de referencia de la pirámide de testing, con ejemplos de
    código reales por nivel y consejos para no acabar en el "cono de helado".
  category: testing
  type: articulo
  lang: en

- id: fowler-architecture
  title: Software Architecture Guide — martinfowler.com
  url: https://martinfowler.com/architecture/
  description: >-
    Colección curada de artículos sobre arquitectura: capas, microservicios,
    monolitos, y cuándo cada decisión compensa. Lectura pausada y sin humo.
  category: arquitectura
  type: documentacion
  lang: en

- id: github-actions-docs
  title: Documentación de GitHub Actions
  url: https://docs.github.com/es/actions
  description: >-
    La referencia oficial (en español) para montar pipelines de CI/CD:
    sintaxis de workflows, eventos, runners, caché y despliegues.
  category: devops
  type: documentacion
  lang: es

- id: use-the-index-luke
  title: Use The Index, Luke!
  url: https://use-the-index-luke.com/es
  description: >-
    Libro web gratuito sobre índices y rendimiento SQL: cómo funcionan los
    B-tree, por qué tu consulta ignora el índice y cómo leer planes de
    ejecución. Con versión en español.
  category: bases-de-datos
  type: libro
  lang: es

- id: scrum-guide
  title: La Guía de Scrum
  url: https://scrumguides.org
  description: >-
    La definición oficial de Scrum por sus creadores, en menos de 15 páginas
    (con traducción al español). Útil también para detectar cuánto "Scrum"
    de tu empresa no está aquí.
  category: metodologias
  type: documentacion
  lang: es

- id: owasp-cheatsheets
  title: OWASP Cheat Sheet Series
  url: https://cheatsheetseries.owasp.org
  description: >-
    Guías concisas y accionables por tema de seguridad: almacenamiento de
    contraseñas, sesiones, JWT, validación de entrada… El complemento
    práctico del Top 10.
  category: seguridad
  type: documentacion
  lang: en
